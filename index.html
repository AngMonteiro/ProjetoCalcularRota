<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App de Rotas</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <div class="sidebar-panel">
        <h1>Meu App de Rotas</h1>

        <div class="input-group">
            <label for="origin-input">Origem:</label>
            <input type="text" id="origin-input" placeholder="Ex: São Paulo, SP ou CEP..." class="location-input" data-type="origin">
            <ul id="origin-suggestions" class="autocomplete-suggestions"></ul>
        </div>

        <div id="intermediate-stops-container">
            <!-- Paradas intermediárias serão adicionadas aqui dinamicamente -->
        </div>

        <button id="add-stop-btn" class="action-button">Adicionar Parada</button>

        <div class="input-group">
            <label for="destination-input">Destino:</label>
            <input type="text" id="destination-input" placeholder="Ex: Rio de Janeiro, RJ ou CEP..." class="location-input" data-type="destination">
            <ul id="destination-suggestions" class="autocomplete-suggestions"></ul>
        </div>

        <button id="calc-route-btn" class="action-button" style="margin-bottom:5px;">🗺️ Calcular Rota</button>
        <p id="status-msg" style="font-size:0.9rem;text-align:center;display:none;"></p>

        <div class="map-layers">
            <h2>Camadas do Mapa</h2>
            <div class="layer-option">
                <input type="radio" id="layer-dark" name="map-layer" value="dark" checked>
                <label for="layer-dark">Modo Escuro</label>
            </div>
            <div class="layer-option">
                <input type="radio" id="layer-streets" name="map-layer" value="streets">
                <label for="layer-streets">Ruas (OSM)</label>
            </div>
            <div class="layer-option">
                <input type="radio" id="layer-satellite" name="map-layer" value="satellite">
                <label for="layer-satellite">Satélite (Esri)</label>
            </div>
        </div>

        <div id="route-details" class="route-info">
            <h2>Detalhes da Rota</h2>
            <p id="total-distance">Distância: --</p>
            <p id="total-time">Tempo Estimado: --</p>
            <div id="turn-by-turn">
                <h3>Navegação Curva a Curva:</h3>
                <ul id="instructions-list">
                    <!-- Instruções serão carregadas aqui -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="app_v2.js"></script>
</body>
</html>
